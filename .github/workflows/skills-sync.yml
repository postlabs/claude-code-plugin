name: skills-sync

# Fails if the generated dough-creator skills (skills/, skills-codex/) are out of
# sync with their single source (skills-src/). Fix locally with:
#   python dough-creator/skills-src/sync_skills.py

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: dough-creator skills in sync
        run: python dough-creator/skills-src/sync_skills.py --check
