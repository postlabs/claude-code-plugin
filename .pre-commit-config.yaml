# Install once per clone:  pre-commit install
# Then every `git commit` runs the hooks below.
repos:
  - repo: local
    hooks:
      - id: toast-creator-skills-sync
        name: toast-creator skills in sync
        # Fails the commit if skills/ or skills-codex/ drifted from skills-src/.
        # Fix:  python toast-creator/skills-src/sync_skills.py
        entry: python toast-creator/skills-src/sync_skills.py --check
        language: system
        pass_filenames: false
        always_run: true
